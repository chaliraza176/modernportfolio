<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Ali Raza</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <style>
        body { background: var(--bg-color, #121212); color: var(--text-color, #fff); }
        .admin-section { padding: 40px 20px; min-height: 100vh; }
        .admin-container { max-width: 800px; margin: 0 auto; background: var(--card-bg, #1a1a1a); padding: 30px; border-radius: 12px; border: 1px solid var(--border-color, #333); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .admin-title { font-size: 2rem; margin-bottom: 25px; color: var(--secondary-color, #0066CC); }
        .form-group-admin { margin-bottom: 20px; }
        .form-group-admin label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        .form-group-admin input, .form-group-admin textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color, #444); background: rgba(0,0,0,0.3); color: #fff; font-family: inherit; font-size: 15px; }
        .form-group-admin input:focus, .form-group-admin textarea:focus { outline: none; border-color: var(--secondary-color, #0066CC); box-shadow: 0 0 0 2px rgba(0,102,204,0.3); }
        
        .tags-container { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        .tag-item { background: var(--secondary-color, #0066CC); padding: 6px 12px; border-radius: 20px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .tag-item button { background: none; border: none; color: #fff; cursor: pointer; font-size: 14px; padding: 0; outline: none; transition: transform 0.2s; }
        .tag-item button:hover { transform: scale(1.2); }
        
        .add-tag-wrapper { display: flex; gap: 10px; }
        .btn-add { background: var(--secondary-color, #0066CC); border: none; color: #fff; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: background 0.3s; white-space: nowrap; }
        .btn-add:hover { filter: brightness(1.1); }
        
        .projects-list { margin-top: 50px; }
        .project-list-item { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border-color, #444); transition: transform 0.3s; }
        .project-list-item:hover { transform: translateY(-2px); border-color: var(--secondary-color, #0066CC); }
        .btn-delete { background: #dc3545; border: none; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: bold; transition: background 0.3s; }
        .btn-delete:hover { background: #c82333; }
        
        .back-link { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 20px; color: var(--secondary-color, #0066CC); text-decoration: none; font-weight: bold; transition: color 0.3s; }
        .back-link:hover { color: #fff; }

        /* Login Screen Styles */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .login-card { background: var(--card-bg, #1a1a1a); padding: 40px; border-radius: 12px; border: 1px solid var(--border-color, #333); width: 100%; max-width: 400px; text-align: center; }
        .login-card h2 { margin-bottom: 30px; color: var(--secondary-color); font-size: 1.8rem; }
        .login-input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid var(--border-color, #444); background: rgba(0,0,0,0.3); color: #fff; font-size: 1rem; }
        .login-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--secondary-color); color: #fff; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .login-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-logout { background: transparent; border: 1px solid var(--border-color); color: var(--text-color); padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.3s; margin-left: auto; }
        .btn-logout:hover { background: #dc3545; border-color: #dc3545; color: white; }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen">
        <div class="login-card">
            <h2>Admin Login</h2>
            <form id="loginForm">
                <input type="email" id="loginEmail" class="login-input" placeholder="Admin Email" required>
                <input type="password" id="loginPass" class="login-input" placeholder="Password" required>
                <button type="submit" class="login-btn">LOGIN</button>
                <p id="forgotPassLink" style="margin-top: 15px; font-size: 0.85rem; color: var(--text-gray); cursor: pointer; text-decoration: underline;">Forgot Password?</p>
            </form>
        </div>
    </div>

    <!-- Admin Panel Content (Hidden by default) -->
    <section class="admin-section" id="adminPanel" style="display: none;">
        <div class="admin-container">
            <div style="display: flex; align-items: center; margin-bottom: 20px;">
                <a href="index.html" class="back-link" style="margin-bottom: 0;"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
                <button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
            <h2 class="admin-title" id="formTitle">Add New Project</h2>
            <form id="adminForm">
                <input type="hidden" id="projectID">
                <div class="form-group-admin">
                    <label>Project Title *</label>
                    <input type="text" id="pTitle" required placeholder="e.g. Modern E-commerce Store">
                </div>
                <div class="form-group-admin">
                    <label>Description *</label>
                    <textarea id="pDesc" rows="4" required placeholder="Describe your project..."></textarea>
                </div>
                <div class="form-group-admin">
                    <label>Image URL *</label>
                    <input type="url" id="pImage" value="https://via.placeholder.com/500x300/333333/ffffff?text=New+Project" required>
                </div>
                <div class="form-group-admin">
                    <label>Languages / Tools</label>
                    <div class="add-tag-wrapper">
                        <input type="text" id="tagInput" placeholder="e.g. React">
                        <button type="button" class="btn-add" id="addTagBtn"><i class="fas fa-plus"></i> Add Tag</button>
                    </div>
                    <div class="tags-container" id="tagsList"></div>
                </div>
                <div class="form-group-admin">
                    <label>Live Demo URL (Optional)</label>
                    <input type="url" id="pLive" placeholder="https://...">
                </div>
                <div class="form-group-admin">
                    <label>GitHub URL (Optional)</label>
                    <input type="url" id="pGithub" placeholder="https://github.com/...">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn btn-primary" id="submitBtn" style="flex: 2; border-radius: 8px; padding: 15px;">Save Project</button>
                    <button type="button" class="btn btn-secondary" id="cancelEditBtn" style="flex: 1; border-radius: 8px; padding: 15px; display: none;">Cancel</button>
                </div>
            </form>

            <div class="projects-list" id="projectsList">
                <h3 style="margin-bottom: 20px; font-size: 1.5rem; border-bottom: 2px solid var(--border-color, #444); padding-bottom: 10px;">Your Added Projects</h3>
                <!-- List added dynamically -->
            </div>
        </div>
    </section>

    <!-- Theme Loading Script to Match Portfolio Colors -->
    <script>
        // Apply theme color if saved
        const savedColor = localStorage.getItem('themeColor');
        if (savedColor) {
            const root = document.documentElement;
            function hexToRgb(hex) {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null;
            }
            function darkenColor(hex, percent) {
                const rgb = hexToRgb(hex); if (!rgb) return hex;
                const r = Math.floor(rgb.r * (1 - percent)), g = Math.floor(rgb.g * (1 - percent)), b = Math.floor(rgb.b * (1 - percent));
                return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
            }
            function lightenColor(hex, percent) {
                const rgb = hexToRgb(hex); if (!rgb) return hex;
                const r = Math.min(255, Math.floor(rgb.r + (255 - rgb.r) * percent)), g = Math.min(255, Math.floor(rgb.g + (255 - rgb.g) * percent)), b = Math.min(255, Math.floor(rgb.b + (255 - rgb.b) * percent));
                return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
            }
            const primaryColor = darkenColor(savedColor, 0.3);
            const secondaryColor = savedColor;
            const accentColor = lightenColor(savedColor, 0.2);
            const rgb = hexToRgb(savedColor);
            const primaryRgb = hexToRgb(primaryColor);
            root.style.setProperty('--primary-color', primaryColor);
            root.style.setProperty('--secondary-color', secondaryColor);
            root.style.setProperty('--accent-color', accentColor);
            root.style.setProperty('--primary-rgb', `${primaryRgb.r}, ${primaryRgb.g}, ${primaryRgb.b}`);
            root.style.setProperty('--secondary-rgb', `${rgb.r}, ${rgb.g}, ${rgb.b}`);
            root.style.setProperty('--border-color', `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.3)`);
            root.style.setProperty('--card-bg', `rgba(${primaryRgb.r}, ${primaryRgb.g}, ${primaryRgb.b}, 0.1)`);
        }
    </script>
    <script src="js/admin.js"></script>
</body>
</html>
