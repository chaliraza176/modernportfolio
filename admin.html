<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Magic Link Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --secondary-color: #00ffcc;
            --text-gray: #a0a0a0;
        }
        
        body { background-color: var(--bg-color); color: white; font-family: 'Inter', sans-serif; }

        /* Error/Status Banners */
        #libError { display: none; background: #ff4444; color: white; padding: 10px; text-align: center; font-weight: bold; position: fixed; top: 0; width: 100%; z-index: 2000; }

        /* Login Screen */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; text-align: center; width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 8px; font-size: 1rem; }
        .magic-btn { width: 100%; padding: 12px; margin-top: 15px; background: var(--secondary-color); color: black; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        .magic-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px var(--secondary-color); }
        .magic-btn:disabled { background: #555; cursor: not-allowed; transform: none; box-shadow: none; }
        
        /* Admin Panel Styles */
        #adminPanel { display: none; padding: 40px; max-width: 1200px; margin: 0 auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .form-section { background: rgba(255,255,255,0.03); padding: 30px; border-radius: 15px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.05); }
        .project-list-section { background: rgba(255,255,255,0.03); padding: 30px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .project-list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tag-item { display: inline-flex; background: var(--secondary-color); color: black; padding: 5px 12px; border-radius: 20px; margin: 5px; font-size: 0.8rem; font-weight: bold; }
        .logout-btn { background: #ff4444; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="libError">⚠ Warning: Database library (Supabase) failed to load. Please check your internet connection!</div>

    <!-- Login Screen -->
    <div id="loginScreen">
        <div class="login-card">
            <h2 style="margin-bottom: 10px; color: var(--secondary-color);">Admin Panel</h2>
            <p style="color: var(--text-gray); font-size: 0.9rem; margin-bottom: 20px;">Magic Link Login (Owner Only)</p>
            <form id="magicForm">
                <input type="email" id="magicEmail" class="login-input" value="alirazachh176@gmail.com" readonly required>
                <button type="submit" class="magic-btn" id="sendBtn">SEND MAGIC LINK</button>
            </form>
            <p id="statusMsg" style="margin-top: 20px; font-size: 0.85rem; color: var(--secondary-color); display: none; min-height: 1.2rem;"></p>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel">
        <div class="admin-header">
            <h1>Project Dashboard</h1>
            <button id="logoutBtn" class="logout-btn">LOGOUT</button>
        </div>
        <div class="form-section">
            <h2 id="formTitle">Add New Project</h2>
            <form id="adminForm" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                <div class="form-group" style="grid-column: span 2;">
                    <label>Project Title</label>
                    <input type="text" id="pTitle" class="login-input" placeholder="e.g. AdFlow Pro" required>
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Description</label>
                    <textarea id="pDesc" class="login-input" style="height: 100px;" required></textarea>
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="url" id="pImage" class="login-input" placeholder="Unsplash Link" required>
                </div>
                <div class="form-group">
                    <label>Tags (Comma separated)</label>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="tagInput" class="login-input" placeholder="e.g. React, UI/UX">
                        <button type="button" id="addTagBtn" class="magic-btn" style="width:auto; margin-top:10px;">Add</button>
                    </div>
                </div>
                <div id="tagsList" style="grid-column: span 2;"></div>
                <input type="hidden" id="projectID">
                <div style="grid-column: span 2; display: flex; gap: 10px;">
                    <button type="submit" id="submitBtn" class="magic-btn">SAVE PROJECT</button>
                    <button type="button" id="cancelEditBtn" class="magic-btn" style="background:#444; color:white; display:none;">CANCEL</button>
                </div>
            </form>
        </div>
        <div class="project-list-section">
            <h3>Active Projects</h3>
            <div id="projectsList" style="margin-top:20px;"></div>
        </div>
    </div>

    <!-- SDK and Scripts (Safe Order) -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script>
        // Post-load check for Supabase SDK
        window.addEventListener('load', () => {
            if (typeof supabase === 'undefined') {
                document.getElementById('libError').style.display = 'block';
                const sendBtn = document.getElementById('sendBtn');
                sendBtn.disabled = true;
                sendBtn.textContent = 'CONNECTION ERROR';
            }
        });
    </script>
    <script src="js/admin.js"></script>
</body>
</html>
