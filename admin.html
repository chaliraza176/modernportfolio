<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --secondary-color: #00ffcc;
            --text-gray: #a0a0a0;
        }
        
        body { background-color: var(--bg-color); color: white; font-family: 'Inter', sans-serif; }

        /* Error/Status Banners */
        #libError { display: none; background: #ff4444; color: white; padding: 10px; text-align: center; font-weight: bold; position: fixed; top: 0; width: 100%; z-index: 2000; }

        /* Login Screen */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; text-align: center; width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 8px; font-size: 1rem; }
        .magic-btn { width: 100%; padding: 12px; margin-top: 15px; background: var(--secondary-color); color: black; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        .magic-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px var(--secondary-color); }
        .magic-btn:disabled { background: #555; cursor: not-allowed; }
        
        #adminPanel { display: none; padding: 40px; max-width: 1200px; margin: 0 auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .form-section { background: rgba(255,255,255,0.03); padding: 30px; border-radius: 15px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.05); }
        .project-list-section { background: rgba(255,255,255,0.03); padding: 30px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .project-list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tag-item { display: inline-flex; background: var(--secondary-color); color: black; padding: 5px 12px; border-radius: 20px; margin: 5px; font-size: 0.8rem; font-weight: bold; }
        .logout-btn { background: #ff4444; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .toggle-btn { background: none; border: none; color: var(--secondary-color); cursor: pointer; margin-top: 10px; font-size: 0.85rem; text-decoration: underline; }
    </style>
</head>
<body>

    <div id="libError">⚠ Database library failed to load. Check your internet!</div>

    <!-- Login Screen -->
    <div id="loginScreen">
        <div class="login-card">
            <h2 id="loginTitle" style="margin-bottom: 10px; color: var(--secondary-color);">Admin Login</h2>
            
            <!-- Magic Link UI -->
            <div id="magicLoginUI">
                <p style="color: var(--text-gray); font-size: 0.85rem; margin-bottom: 20px;">Requested Magic Link will be sent to your Gmail.</p>
                <form id="magicForm">
                    <input type="email" id="magicEmail" class="login-input" value="alirazachh176@gmail.com" readonly>
                    <button type="submit" class="magic-btn" id="sendBtn">SEND MAGIC LINK</button>
                </form>
                <button class="toggle-btn" onclick="toggleMode('password')">Or Login with Password</button>
            </div>

            <!-- Password Login UI -->
            <div id="passwordLoginUI" style="display: none;">
                <p style="color: var(--text-gray); font-size: 0.85rem; margin-bottom: 20px;">Login with your secured password.</p>
                <form id="loginForm">
                    <input type="email" id="loginEmail" class="login-input" value="alirazachh176@gmail.com" readonly>
                    <input type="password" id="loginPass" class="login-input" placeholder="Password" required>
                    <button type="submit" class="magic-btn">LOGIN NOW</button>
                </form>
                <button class="toggle-btn" onclick="toggleMode('magic')">Or Use Magic Link</button>
            </div>

            <p id="statusMsg" style="margin-top: 20px; font-size: 0.85rem; color: var(--secondary-color); min-height: 1.2rem;"></p>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel">
        <div class="admin-header">
            <h1>Project Dashboard</h1>
            <button id="logoutBtn" class="logout-btn">LOGOUT</button>
        </div>
        <div class="form-section">
            <h2 id="formTitle">Add New Project</h2>
            <form id="adminForm" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group" style="grid-column: span 2;">
                    <label>Project Title</label>
                    <input type="text" id="pTitle" class="login-input" placeholder="Project Name" required>
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Description</label>
                    <textarea id="pDesc" class="login-input" style="height: 80px;" required></textarea>
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Project Image</label>
                    <div style="display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 15px; align-items: start;">
                        <div style="display: flex; flex-direction: column; gap: 10px;">
                            <input type="file" id="pImageFile" accept="image/*" class="login-input" style="padding: 10px; border: 1px dashed var(--secondary-color); background: rgba(0,0,0,0.2); cursor: pointer;">
                            <div style="text-align: center; color: var(--text-gray); font-size: 0.8rem;">— OR PASTE IMAGE URL —</div>
                            <input type="url" id="pImage" class="login-input" placeholder="https://unsplash.com/... or web link" required>
                        </div>
                        <div id="imagePreviewContainer" style="display: flex; justify-content: center; align-items: center; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; height: 116px; background: rgba(0,0,0,0.4); overflow: hidden; position: relative;">
                            <span id="previewText" style="color: var(--text-gray); font-size: 0.85rem; font-weight: 500;">No Image Selected</span>
                            <img id="imagePreview" src="" alt="Preview" style="display: none; width: 100%; height: 100%; object-fit: cover;">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="pCategory" class="login-input" style="height: 48px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; background: rgba(0,0,0,0.3); color: white;">
                        <option value="react">React</option>
                        <option value="portfolio">Portfolio</option>
                        <option value="apps">Apps</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Display Position (Order)</label>
                    <input type="number" id="pPosition" class="login-input" min="1" placeholder="e.g., 1 (for first), 2, 3..." style="height: 48px;">
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Tags</label>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="tagInput" class="login-input" placeholder="React, Node">
                        <button type="button" id="addTagBtn" class="magic-btn" style="width:auto; margin-top:10px;">Add</button>
                    </div>
                </div>
                <div id="tagsList" style="grid-column: span 2;"></div>
                <div class="form-group"><label>Live Demo</label><input type="url" id="pLive" class="login-input"></div>
                <div class="form-group"><label>GitHub Link</label><input type="url" id="pGithub" class="login-input"></div>
                <input type="hidden" id="projectID">
                <div style="grid-column: span 2; display: flex; gap: 10px;">
                    <button type="submit" id="submitBtn" class="magic-btn">SAVE PROJECT</button>
                    <button type="button" id="cancelEditBtn" class="magic-btn" style="background:#444; color:white; display:none;">CANCEL</button>
                </div>
            </form>
        </div>
        <div class="project-list-section">
            <h3>Active Projects</h3>
            <div id="projectsList" style="margin-top:20px;"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script>
        window.addEventListener('load', () => {
            if (typeof supabase === 'undefined') document.getElementById('libError').style.display = 'block';
        });
        function toggleMode(mode) {
            document.getElementById('magicLoginUI').style.display = (mode === 'magic') ? 'block' : 'none';
            document.getElementById('passwordLoginUI').style.display = (mode === 'password') ? 'block' : 'none';
            document.getElementById('statusMsg').textContent = '';
        }
    </script>
    <script src="js/admin.js"></script>
</body>
</html>
